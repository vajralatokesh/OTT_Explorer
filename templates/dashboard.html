<!DOCTYPE html>
<html>

<head>
<title>OTT Explorer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- ===============================
NAVBAR
================================ -->

<div class="navbar">

<h2>OTT Explorer</h2>

<form method="GET" action="{{ url_for('dashboard') }}">

<input
type="text"
name="search"
placeholder="Search movies"
value="{{ request.args.get('search','') }}"
>

<select name="language">
<option value="">All Languages</option>

<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="ml">Malayalam</option>
<option value="kn">Kannada</option>
<option value="mr">Marathi</option>
<option value="bn">Bengali</option>
<option value="pa">Punjabi</option>
<option value="gu">Gujarati</option>

<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="zh">Chinese</option>
<option value="th">Thai</option>
<option value="vi">Vietnamese</option>
<option value="id">Indonesian</option>

<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="pt">Portuguese</option>
<option value="ru">Russian</option>
<option value="tr">Turkish</option>
<option value="ar">Arabic</option>
<option value="nl">Dutch</option>
<option value="sv">Swedish</option>
<option value="pl">Polish</option>
<option value="uk">Ukrainian</option>
</select>

<select name="genre">
<option value="">Genre</option>
<option value="28">Action</option>
<option value="12">Adventure</option>
<option value="16">Animation</option>
<option value="35">Comedy</option>
<option value="80">Crime</option>
<option value="99">Documentary</option>
<option value="18">Drama</option>
<option value="10751">Family</option>
<option value="14">Fantasy</option>
<option value="36">History</option>
<option value="27">Horror</option>
<option value="10402">Music</option>
<option value="9648">Mystery</option>
<option value="10749">Romance</option>
<option value="878">Sci-Fi</option>
<option value="53">Thriller</option>
</select>

<button type="submit">Filter</button>

</form>

<div>
<a href="{{ url_for('anime') }}">Anime</a>
<a href="{{ url_for('watchlist') }}">Watchlist</a>
<a href="{{ url_for('logout') }}">Logout</a>
</div>

</div>

<!-- ===============================
MOVIES SECTION
================================ -->

<h2 class="section-title">Movies</h2>

<div class="movies-grid">

{% for movie in movies %}

<div class="card">

<!-- MOVIE DETAIL LINK -->
<a href="{{ url_for('movie_details', id=movie.id) }}">

<img
class="poster"
src="{{ image_base }}{{ movie.poster_path }}"
onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'"
>

</a>

<p>{{ movie.title }}</p>

<!-- FIXED WATCHLIST BUTTON -->
<a href="{{ url_for('add_movie_watchlist', id=movie.id) }}">
<button class="watchlist-btn">
Add Watchlist
</button>
</a>

</div>

{% endfor %}

</div>

<!-- ===============================
EMPTY STATE
================================ -->

{% if movies|length == 0 %}

<div style="padding:40px;text-align:center;opacity:0.6">
<h2>No movies found</h2>
<p>Try another search</p>
</div>

{% endif %}

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
