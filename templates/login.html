<!DOCTYPE html>
<html>

<head>

<title>OTT Explorer Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
background:#0b0b0b;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* LOGIN BOX */

.login-container{
background:#111;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.8);
text-align:center;
}

/* TITLE */

.login-container h1{
color:#e50914;
margin-bottom:25px;
}

/* INPUTS */

.input-group{
margin-bottom:15px;
}

.input-group input{
width:100%;
padding:12px;
border:none;
border-radius:5px;
background:#222;
color:white;
font-size:14px;
outline:none;
transition:0.3s;
}

.input-group input:focus{
background:#333;
border:1px solid #e50914;
}

/* BUTTON */

.login-btn{
width:100%;
padding:12px;
border:none;
background:#e50914;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:#ff1e1e;
}

/* REGISTER TEXT */

.register-text{
margin-top:15px;
font-size:14px;
}

.register-text a{
color:#e50914;
text-decoration:none;
font-weight:bold;
}

.register-text a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-container">

<h1>OTT Explorer</h1>

<form method="POST">

<div class="input-group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<button class="login-btn" type="submit">Login</button>

</form>

<div class="register-text">

Don't have an account?  
<a href="/register">Register</a>

</div>

</div>

</body>
</html>
